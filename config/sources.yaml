# sources.yaml — source_id → family_id + reliability weight
# The independence judgments that noisy-OR depends on.
# Multiple sensors/APIs in the same family do NOT independently corroborate each other.

sources:
  # --- Text feeds ---
  ucdp_ged_bulk:
    family_id: ucdp
    label: "UCDP Georeferenced Event Database (bulk)"
    modality: text
    reliability_w: 1.0
    license: CC-BY-4.0
    url: "https://ucdp.uu.se/downloads/"
    notes: "Open, no login. Authoritative post-hoc; latency ~weeks. MVP text feed."

  gdelt_v2:
    family_id: gdelt
    label: "GDELT Event Database v2"
    modality: text
    reliability_w: 0.6
    license: Public Domain
    url: "https://www.gdeltproject.org/"
    notes: "Near-real-time, no login, high volume. Lower geocoding quality. Fallback."

  acled_api:
    family_id: acled
    label: "ACLED API"
    modality: text
    reliability_w: 0.9
    license: "ACLED Terms (requires registration)"
    url: "https://developer.acleddata.com/"
    notes: "Gated — registration required. OFF by default. Better geocoding than GDELT."
    paid: false
    requires_key: true

  # --- Thermal / satellite ---
  firms_viirs_snpp:
    family_id: nasa_firms         # VIIRS SNPP + NOAA-20 are same sensor family
    label: "NASA FIRMS VIIRS SNPP active fire"
    modality: thermal
    reliability_w: 0.85
    license: "Public Domain (NASA)"
    url: "https://firms.modaps.eosdis.nasa.gov/"
    notes: "Requires free FIRMS_MAP_KEY. 375m resolution."
    requires_key: true
    key_env: FIRMS_MAP_KEY

  firms_viirs_noaa20:
    family_id: nasa_firms         # same family as SNPP — both from FIRMS/VIIRS
    label: "NASA FIRMS VIIRS NOAA-20 active fire"
    modality: thermal
    reliability_w: 0.85
    license: "Public Domain (NASA)"
    url: "https://firms.modaps.eosdis.nasa.gov/"
    requires_key: true
    key_env: FIRMS_MAP_KEY

  firms_modis:
    family_id: nasa_modis         # different sensor → different family
    label: "NASA FIRMS MODIS active fire"
    modality: thermal
    reliability_w: 0.75
    license: "Public Domain (NASA)"
    url: "https://firms.modaps.eosdis.nasa.gov/"
    requires_key: true
    key_env: FIRMS_MAP_KEY
    notes: "1km resolution; older sensor. Corroborates VIIRS independently."

  # --- Imagery (Phase 3) — acquired via Google Earth Engine (noncommercial, no billing) ---
  # Independence is keyed on family_id: SAR-amplitude and optical are DISTINCT families (each
  # independently lifts noisy-OR confidence); SAR classical vs SAR deep are the SAME family.
  sentinel1_sar_logratio:
    family_id: copernicus_sar
    label: "Sentinel-1 SAR amplitude log-ratio change (GEE σ0)"
    modality: imagery
    reliability_w: 0.8
    license: "Copernicus Open Access (via Google Earth Engine, noncommercial)"
    url: "https://developers.google.com/earth-engine/datasets/catalog/COPERNICUS_S1_GRD"
    notes: "Classical deterministic change detector (Phase 3e). The baseline the deep model must beat."
    phase: 3
  sentinel2_optical_index:
    family_id: copernicus_optical     # distinct family from SAR — independent corroboration
    label: "Sentinel-2 spectral-index change (NDWI flood / NBR burn, GEE)"
    modality: imagery
    reliability_w: 0.75
    license: "Copernicus Open Access (via Google Earth Engine, noncommercial)"
    url: "https://developers.google.com/earth-engine/datasets/catalog/COPERNICUS_S2_SR_HARMONIZED"
    notes: "Classical spectral-index detector (Phase 3f); cloud-limited, SAR covers the gaps."
    phase: 3
  sentinel1_sar_deepcd:
    family_id: copernicus_sar         # SAME family as log-ratio — NOT independent corroboration
    label: "Sentinel-1 SAR deep change model (Phase 3h)"
    modality: imagery
    reliability_w: 0.85
    license: "Copernicus Open Access (via GEE) + HF-hosted weights (pinned digest)"
    notes: "Deep Siamese/U-Net change model; must beat the classical baseline on the real eval set to ship."
    phase: 3

  unosat:
    family_id: unosat                 # authoritative human-analyst damage assessment (own family)
    label: "UNOSAT / UNITAR satellite damage assessment"
    modality: imagery
    reliability_w: 1.0
    license: "UNOSAT / UNITAR — free for non-commercial / humanitarian use (CC-BY-3.0-IGO)"
    url: "https://unosat.org/products/"
    notes: "Building-level war-damage points (2022 onwards). Used as 3e eval ground truth AND ingested as a dated historical damage layer for the 2022-onwards chronology."
