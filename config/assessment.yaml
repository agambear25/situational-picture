# assessment.yaml — Phase-4a knobs for the insights engine (significance + anomaly).
# Deterministic scoring over the read model; no magic numbers in code.

assessment:
  # significance = severity × confidence × recency × novelty   (each in [0,1])
  significance:
    recency_tau_days: 14.0          # recency = exp(-age_days / tau); recent events score higher
    # Floor so a major HISTORICAL event still surfaces: recency_factor = floor + (1-floor)·decay.
    # Without it, the time-decay zeroes everything older than ~2 months and the feed is just the
    # newest low-value reports. 0.4 lets severity × confidence carry notable past events.
    recency_floor: 0.5
    # Corroboration weight: a COP's "what to look at first" must lead with CONFIRMED incidents.
    # Single-source (one independent family → Rumored) events are real but less actionable, so they
    # are scored down. Without this, thousands of single-source UCDP strike reports — each maximally
    # "novel" in its own cell-month — swamp the handful of multi-source confirmed incidents.
    corroboration_single_factor: 0.5
    # Per-event-type severity weight [0,1]. Higher = inherently more important to surface.
    severity:
      missile_launch:        0.95
      bridge_destroyed:      0.95
      airstrike:             0.90
      strike:                0.85
      naval_engagement:      0.85
      building_damaged:      0.80
      hospital_event:        0.85
      civilian_displacement: 0.80
      bridge_damaged:        0.75
      artillery_fire:        0.75
      explosion:             0.75
      crater:                0.70
      utility_damaged:       0.70
      armor_move:            0.65
      troop_move:            0.60
      convoy:                0.60
      flood:                 0.65
      crossing:              0.55
      naval_mine:            0.70
      naval_transit:         0.45
      road_blocked:          0.50
      checkpoint_established: 0.45
      checkpoint_removed:    0.45
      burn_scar:             0.45
      installation_change:   0.65
      fire:                  0.40
      humanitarian_delivery: 0.30
      other:                 0.30
      _default:              0.50

  # 4c — exposure: events in/near populated places (gazetteer settlement proximity is the $0 proxy
  # until cell_context.builtup_pct is populated). Severity × proximity → who/what is at risk.
  exposure:
    radius_km: 15.0            # an event within this of a settlement is "exposed"; linear falloff
    min_score: 0.12

  # 4c — collection-gap: recent, high-stakes, SINGLE-source events worth pointing collection at.
  # Not "every uncorroborated event" (there are thousands) — only severe + recent ones to chase.
  gaps:
    min_severity: 0.75        # high-stakes types only (strike/airstrike/damage/bridge/missile…)
    recent_days: 120.0        # only recent gaps are actionable
    min_score: 0.2

  # Per-cell anomaly detection over the chronology.
  anomaly:
    recent_window_days: 10.0        # what counts as "recent" activity
    baseline_window_days: 120.0     # the history we compare against
    spike_min_recent: 3             # >= this many recent events to consider a spike
    spike_ratio: 2.0                # recent rate must exceed baseline rate by this factor
    min_significance: 0.15          # drop trivially-low significance assessments from /insights
